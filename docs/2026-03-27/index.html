<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending - March 27, 2026</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1>GitHub Trending Digest - March 27, 2026</h1>
        <nav>
            <a href="../">&larr; GitHub Calendar</a>
            <a href="../hn/">Hacker News</a>
        </nav>
    </header>
    <main>

        <h2 class="section-heading">Today's Daily Trending</h2>
        <div class="repo-controls">
            <button id="collapse-seen-btn" type="button">Collapse Repos Not New Today</button>
            <button id="expand-all-btn" type="button">Expand All</button>
        </div>
        <p class="seen-help">Repos marked "Not new today" appeared on one or more previous daily pages.</p>
        <article>
            <div class="repos">
<p class="empty-state">No GitHub repositories available for this day.</p>
            </div>
        </article>
    </main>
    <footer>
        <p>Generated automatically. Data from <a href="https://github.com/trending">GitHub Trending</a>.</p>
    </footer>

<script>
(() => {
    const readKey = "gtd:read_days:gh:v1";
    const dayStr = "2026-03-27";

    let stored = [];
    try {
        stored = JSON.parse(localStorage.getItem(readKey) || "[]");
        if (!Array.isArray(stored)) {
            stored = [];
        }
    } catch (_err) {
        stored = [];
    }

    if (!stored.includes(dayStr)) {
        stored.push(dayStr);
        stored.sort();
        localStorage.setItem(readKey, JSON.stringify(stored));
    }

    const collapseParam = new URLSearchParams(window.location.search).get("collapse_seen");
    const collapseSeen = collapseParam === "0" ? false : true;

    function setCollapsed(repoEl, collapsed) {
        repoEl.classList.toggle("collapsed", collapsed);
        const button = repoEl.querySelector(".repo-toggle");
        if (button) {
            button.textContent = collapsed ? "Show details" : "Hide details";
            button.setAttribute("aria-expanded", String(!collapsed));
        }
    }

    const repos = Array.from(document.querySelectorAll("section.repo[data-seen-before]"));

    repos.forEach((repoEl) => {
        const toggle = repoEl.querySelector(".repo-toggle");
        if (!toggle) {
            return;
        }

        toggle.addEventListener("click", () => {
            setCollapsed(repoEl, !repoEl.classList.contains("collapsed"));
        });
    });

    const collapseBtn = document.getElementById("collapse-seen-btn");
    const expandBtn = document.getElementById("expand-all-btn");

    if (collapseBtn) {
        collapseBtn.addEventListener("click", () => {
            repos.forEach((repoEl) => {
                if (repoEl.dataset.seenBefore === "1") {
                    setCollapsed(repoEl, true);
                }
            });
        });
    }

    if (expandBtn) {
        expandBtn.addEventListener("click", () => {
            repos.forEach((repoEl) => setCollapsed(repoEl, false));
        });
    }

    if (collapseSeen) {
        repos.forEach((repoEl) => {
            if (repoEl.dataset.seenBefore === "1") {
                setCollapsed(repoEl, true);
            }
        });
    }

    // Discuss with AI button
    const toast = document.createElement("div");
    toast.className = "discuss-toast";
    document.body.appendChild(toast);

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function buildGHMarkdown(card) {
        const title = card.dataset.shareTitle || "";
        const url = card.dataset.shareUrl || "";
        const desc = card.querySelector(".description");
        const meta = card.querySelector(".meta");
        const analysis = card.querySelector(".ai-summary");
        let md = "# " + title + "\n";
        md += "Source: " + url;
        if (meta) md += " | " + meta.textContent.trim();
        md += "\n";
        if (desc) md += "\n" + desc.textContent.trim() + "\n";
        if (analysis) md += "\n## Analysis\n" + analysis.textContent.replace("Analysis", "").trim() + "\n";
        return md;
    }

    document.querySelectorAll(".discuss-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
            const card = btn.closest("section.repo");
            if (!card) return;
            const md = buildGHMarkdown(card);
            const text = "I'd like to discuss this repo with you. Here's a summary:\n\n" + md;
            const title = "Discuss: " + (card.dataset.shareTitle || "");
            if (navigator.share) {
                navigator.share({ title: title, text: text }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(
                    () => showToast("Copied to clipboard \u2014 paste into your AI chat"),
                    () => showToast("Failed to copy")
                );
            }
        });
    });
})();
</script>

</body>
</html>

name: Cache Bust Assets

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'style.css'
      - 'preference.js'

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Prevent infinite loops by checking the actor
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject Commit SHA for Cache Busting
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "Using SHA: $SHA_SHORT"
          find docs -name "*.html" -exec sed -i -E "s/(style\.css|preference\.js)(\?v=[^\"']*)?/\1?v=$SHA_SHORT/g" {} +

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || (git commit -m "chore: cache bust assets" && git push)

